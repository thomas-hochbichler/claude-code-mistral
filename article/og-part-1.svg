<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="40%" style="stop-color:#0c1222"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="30%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="line1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#f97316;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="line2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient glow effects -->
  <ellipse cx="600" cy="280" rx="450" ry="300" fill="url(#glowBlue)"/>
  <ellipse cx="700" cy="350" rx="350" ry="250" fill="url(#glowOrange)"/>

  <!-- Flowing connection lines -->
  <path d="M -50 480 Q 200 420 400 460 Q 600 500 800 380 Q 1000 260 1250 300" stroke="url(#line1)" stroke-width="1" fill="none"/>
  <path d="M -50 500 Q 250 440 450 475 Q 650 510 850 400 Q 1050 290 1250 320" stroke="url(#line2)" stroke-width="0.8" fill="none"/>
  <path d="M -50 520 Q 300 470 500 490 Q 700 510 900 420 Q 1100 330 1250 350" stroke="url(#line1)" stroke-width="0.5" fill="none"/>

  <!-- Floating node dots -->
  <circle cx="400" cy="460" r="3" fill="#f97316" opacity="0.5"/>
  <circle cx="400" cy="460" r="8" fill="#f97316" opacity="0.1"/>
  <circle cx="800" cy="382" r="4" fill="#3b82f6" opacity="0.6"/>
  <circle cx="800" cy="382" r="10" fill="#3b82f6" opacity="0.1"/>
  <circle cx="600" cy="502" r="2.5" fill="#f97316" opacity="0.4"/>
  <circle cx="1000" cy="290" r="3" fill="#f97316" opacity="0.4"/>
  <circle cx="1000" cy="290" r="8" fill="#f97316" opacity="0.08"/>
  <circle cx="200" cy="470" r="2" fill="#3b82f6" opacity="0.3"/>

  <!-- Series badge — centered -->
  <rect x="496" y="95" width="108" height="30" rx="15" fill="url(#badge)" opacity="0.9"/>
  <text x="550" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1.5">PART 1 / 3</text>

  <!-- Title — centered -->
  <text x="600" y="195" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="60" font-weight="800" fill="#f1f5f9" letter-spacing="-2" text-anchor="middle">
    EU-Compliant
  </text>
  <text x="600" y="265" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="60" font-weight="800" fill="#f1f5f9" letter-spacing="-2" text-anchor="middle">
    Claude Code
  </text>
  <text x="600" y="335" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="60" font-weight="800" letter-spacing="-2" text-anchor="middle">
    <tspan fill="#f97316">with Mistral</tspan>
  </text>

  <!-- Subtitle divider + text — centered -->
  <rect x="575" y="358" width="50" height="3" rx="1.5" fill="#f97316" opacity="0.8"/>
  <text x="600" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#94a3b8" font-weight="400" letter-spacing="0.5" text-anchor="middle">
    Setup Guide — Configuration, Models &amp; Presets
  </text>

  <!-- Routing nodes — small, below subtitle -->
  <g transform="translate(340, 430)" opacity="0.7">
    <!-- Node: Claude Code -->
    <rect x="0" y="0" width="140" height="40" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <circle cx="18" cy="20" r="5" fill="#f97316" opacity="0.5"/>
    <text x="32" y="24" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#e2e8f0" font-weight="600">Claude Code</text>

    <!-- Arrow -->
    <line x1="140" y1="20" x2="175" y2="20" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    <polygon points="173,16 181,20 173,24" fill="#475569"/>

    <!-- Node: Proxy -->
    <rect x="182" y="0" width="140" height="40" rx="8" fill="#0f172a" stroke="#f97316" stroke-width="1"/>
    <circle cx="200" cy="20" r="5" fill="#f97316" opacity="0.7"/>
    <text x="214" y="24" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#fb923c" font-weight="600">proxy</text>

    <!-- Arrow -->
    <line x1="322" y1="20" x2="357" y2="20" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>
    <polygon points="355,16 363,20 355,24" fill="#475569"/>

    <!-- Node: Mistral EU -->
    <rect x="364" y="0" width="160" height="40" rx="8" fill="#0f172a" stroke="#3b82f6" stroke-width="1"/>
    <circle cx="382" cy="20" r="5" fill="#3b82f6" opacity="0.7"/>
    <text x="396" y="24" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#60a5fa" font-weight="600">Mistral API</text>
    <rect x="486" y="8" width="30" height="18" rx="4" fill="#1e3a5f"/>
    <text x="501" y="21" font-family="system-ui, sans-serif" font-size="9" fill="#60a5fa" text-anchor="middle" font-weight="700">EU</text>
  </g>

  <!-- Bottom tags — centered -->
  <g transform="translate(408, 545)">
    <rect x="0" y="0" width="72" height="26" rx="5" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="36" y="17" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#60a5fa" text-anchor="middle">GDPR</text>

    <rect x="82" y="0" width="62" height="26" rx="5" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="113" y="17" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#60a5fa" text-anchor="middle">AI Act</text>

    <rect x="154" y="0" width="62" height="26" rx="5" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="185" y="17" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#60a5fa" text-anchor="middle">NIS2</text>

    <rect x="226" y="0" width="120" height="26" rx="5" fill="#1e293b" stroke="#334155" stroke-width="0.5"/>
    <text x="286" y="17" font-family="'SF Mono', ui-monospace, monospace" font-size="11" fill="#94a3b8" text-anchor="middle">EU data residency</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#bar)"/>
</svg>
